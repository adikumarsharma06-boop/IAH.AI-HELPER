<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with dark slate tech styling -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  
  <!-- Subtle tech pattern inside icon background -->
  <path d="M 0,64 L 512,64 M 0,128 L 512,128 M 0,192 L 512,192 M 0,256 L 512,256 M 0,320 L 512,320 M 0,384 L 512,384 M 0,448 L 512,448" stroke="#1e293b" stroke-width="2" stroke-dasharray="10, 15"/>
  <path d="M 64,0 L 64,512 M 128,0 L 128,512 M 192,0 L 192,512 M 256,0 L 256,512 M 320,0 L 320,512 M 384,0 L 384,512 M 448,0 L 448,512" stroke="#1e293b" stroke-width="2" stroke-dasharray="10, 15"/>

  <!-- Glowing outer circular HUD ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#indigoPinkGlow)" stroke-width="8" stroke-dasharray="12 18" opacity="0.85"/>
  
  <!-- Outer accent rings -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#4f46e5" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#e11d48" stroke-width="2" stroke-dasharray="40 180" opacity="0.5"/>

  <!-- Centered Futuristic glowing Intelligence Shard -->
  <g transform="translate(196, 171)">
    <!-- Base polygonal shape -->
    <polygon points="60,0 120,40 120,110 60,170 0,110 0,40" fill="url(#coreGradient)" stroke="#818cf8" stroke-width="4" filter="url(#glowFilter)"/>
    
    <!-- Cyber circuit lines inside shard -->
    <path d="M 60,0 L 60,170 M 60,50 L 100,80 M 60,80 L 20,110 M 60,120 L 100,140 M 60,120 L 20,140" stroke="#ffffff" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
    
    <!-- Central pulsing brain synapse matrix node -->
    <circle cx="60" cy="80" r="12" fill="#e11d48" filter="url(#nodeGlow)"/>
    <circle cx="60" cy="80" r="5" fill="#ffffff"/>
    
    <!-- Secondary neural nodes -->
    <circle cx="100" cy="80" r="6" fill="#06b6d4"/>
    <circle cx="20" cy="110" r="6" fill="#a855f7"/>
    <circle cx="100" cy="140" r="6" fill="#34d399"/>
  </g>

  <!-- Title typography elements at bottom (very subtle, matching cyberpunk theme) -->
  <text x="256" y="450" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="22" font-weight="900" letter-spacing="8">IAH.AI</text>
  <text x="256" y="475" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="12" font-weight="700" letter-spacing="4">SYSTEM OVERLAY</text>

  <!-- Defs / Gradients -->
  <defs>
    <!-- Core gradient with deep, gorgeous synth-wave tones -->
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    
    <!-- Glowing ring gradient -->
    <linearGradient id="indigoPinkGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Glowing filters for premium holographic presence -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
